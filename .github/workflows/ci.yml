name: CI Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Auth Service
        run: docker build -t auth-service ./auth-service

      - name: Build Content Service
        run: docker build -t content-service ./content-service
